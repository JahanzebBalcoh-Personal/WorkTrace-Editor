<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Portal | WorkTrace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --surface: rgba(15, 15, 15, 0.7);
            --surface-solid: #0d0d0d;
            --accent: #00ffa3;
            --accent-glow: rgba(0, 255, 163, 0.2);
            --secondary: #00d1ff;
            --text: #ffffff;
            --muted: #71717a;
            --border: rgba(255, 255, 255, 0.05);
            --glass: blur(20px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(0, 255, 163, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 209, 255, 0.05) 0%, transparent 40%);
            color: var(--text);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: var(--surface);
            backdrop-filter: var(--glass);
            border-right: 1px solid var(--border);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: calc(100vh - 40px);
            margin: 20px;
            border-radius: 32px;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            letter-spacing: -1px;
            margin-bottom: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-box { width: 32px; height: 32px; background: var(--accent); border-radius: 10px; box-shadow: 0 0 15px var(--accent-glow); }

        .nav-item {
            padding: 14px 20px;
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 16px;
            margin-bottom: 8px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .nav-item.active, .nav-item:hover {
            background: rgba(0, 255, 163, 0.08);
            color: var(--accent);
            transform: translateX(5px);
        }

        /* MAIN CONTENT */
        .main {
            flex: 1;
            margin-left: 320px;
            padding: 60px 80px;
            max-width: 1400px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 60px;
        }

        .stat-card {
            background: var(--surface);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            padding: 32px;
            border-radius: 32px;
            transition: 0.3s;
        }

        .stat-card:hover { border-color: rgba(0, 255, 163, 0.2); transform: translateY(-5px); }

        .stat-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            display: block;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        /* TASK CARD */
        .task-card {
            background: var(--surface);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 32px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: 80px 1fr 200px;
            gap: 24px;
            align-items: center;
            transition: 0.3s;
        }
        .task-card:hover { border-color: rgba(0, 255, 163, 0.1); background: rgba(255,255,255,0.02); }

        .upload-area {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.03);
            border: 2px dashed var(--border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--muted);
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .upload-area:hover { border-color: var(--accent); color: var(--accent); background: rgba(0, 255, 163, 0.05); }
        .upload-area.uploading { pointer-events: none; }
        .upload-progress {
            position: absolute;
            bottom: 0; left: 0; width: 0%; height: 4px;
            background: var(--accent);
            transition: 0.3s;
        }

        .task-details h4 { font-size: 18px; font-weight: 800; margin-bottom: 8px; color: #fff; }
        .task-links { display: flex; gap: 12px; margin-top: 12px; }
        .link-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            text-decoration: none;
            color: var(--secondary);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            border: 1px solid rgba(0, 209, 255, 0.1);
            transition: 0.3s;
        }
        .link-btn:hover { background: var(--secondary); color: #000; }

        .task-action { text-align: right; }
        .status-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 900;
            padding: 6px 12px;
            border-radius: 8px;
            text-transform: uppercase;
            background: rgba(0, 255, 163, 0.1);
            color: var(--accent);
            border: 1px solid rgba(0, 255, 163, 0.1);
        }

        #auth-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
        }

        .view-section { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>

    <div id="auth-overlay">
        <div style="font-size:80px; margin-bottom:20px;">🛡️</div>
        <h1 style="font-size:40px; font-weight:900; margin-bottom:10px; letter-spacing:-1px;">EDITOR ACCESS</h1>
        <p style="color:var(--muted); margin-bottom:40px; font-size:16px;">Secure terminal for WorkTrace creative team.</p>
        <button onclick="login()" style="background:#fff; color:#000; border:none; padding:18px 40px; border-radius:18px; font-weight:900; cursor:pointer; display:flex; align-items:center; gap:12px; font-size:16px;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22"> Login with Google
        </button>
    </div>

    <aside class="sidebar">
        <div class="logo">
            <div class="logo-box"></div>
            EDITOR
        </div>
        <nav>
            <a href="#" class="nav-item active" onclick="switchView('tasks', 'Assignment Board')">Assignments</a>
            <a href="#" class="nav-item" onclick="switchView('earnings', 'Financial Records')">Earnings</a>
            <a href="#" class="nav-item">Settings</a>
        </nav>

        <div style="margin-top: auto; padding: 24px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 24px; display: flex; align-items: center; gap: 12px;">
            <div style="width: 40px; height: 40px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #000;" id="user-initials">ED</div>
            <div>
                <div style="font-size: 13px; font-weight: 700;" id="user-name">Loading...</div>
                <div style="font-size: 10px; color: var(--accent); font-weight: 800; margin-top: 2px; letter-spacing: 1px;">CREATIVE TEAM</div>
            </div>
        </div>
    </aside>

    <main class="main">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:60px;">
            <div>
                <p style="font-size: 12px; color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px;">Workspace</p>
                <h1 id="view-title" style="font-size: 32px; font-weight: 900; letter-spacing: -1px;">Assignment Board</h1>
            </div>
            <button onclick="auth.signOut()" style="background:rgba(255,255,255,0.03); border:1px solid var(--border); color:#fff; padding:16px 24px; border-radius:18px; font-weight:700; cursor:pointer; font-size:13px; transition:0.3s;">Logout</button>
        </header>

        <!-- TASKS VIEW -->
        <section id="view-tasks" class="view-section">
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">Pending Tasks</span>
                    <div class="stat-value" id="stat-tasks">0</div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">In Review</span>
                    <div class="stat-value" id="stat-review" style="color: var(--accent);">0</div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Total Fee</span>
                    <div class="stat-value" id="stat-earnings" style="color: #22c55e;">$0.00</div>
                </div>
            </div>

            <div id="task-list">
                <div style="padding:40px; text-align:center; color:var(--muted);">Syncing workspace...</div>
            </div>
        </section>

        <!-- EARNINGS VIEW -->
        <section id="view-earnings" class="view-section" style="display:none;">
            <div class="stat-card" style="margin-bottom:40px;">
                <span class="stat-label">Lifetime Revenue</span>
                <div class="stat-value" id="total-earned" style="font-size:48px; color:#22c55e;">$0.00</div>
            </div>
            <div style="background:var(--surface); border:1px solid var(--border); border-radius:32px; overflow:hidden;">
                <table style="width:100%; border-collapse:collapse;">
                    <thead style="background:rgba(255,255,255,0.02);">
                        <tr>
                            <th style="text-align:left; padding:24px; font-size:11px; color:var(--muted); text-transform:uppercase;">Project</th>
                            <th style="text-align:left; padding:24px; font-size:11px; color:var(--muted); text-transform:uppercase;">Status</th>
                            <th style="text-align:left; padding:24px; font-size:11px; color:var(--muted); text-transform:uppercase;">Fee</th>
                        </tr>
                    </thead>
                    <tbody id="earnings-list"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
