<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Portal | WorkTrace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --surface: #0d0d0d;
            --accent: #38bdf8;
            --text: #ffffff;
            --muted: #888888;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .logo {
            font-size: 20px;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 60px;
        }

        .nav-item {
            padding: 16px 20px;
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 14px;
            margin-bottom: 12px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .nav-item.active, .nav-item:hover {
            background: rgba(56, 189, 248, 0.08);
            color: var(--accent);
        }

        /* MAIN CONTENT */
        .main {
            flex: 1;
            margin-left: 280px;
            padding: 60px 80px;
            max-width: 1400px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 60px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 32px;
            border-radius: 28px;
            transition: 0.3s;
        }

        .stat-card:hover { border-color: rgba(56, 189, 248, 0.3); transform: translateY(-5px); }

        .stat-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: block;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 900;
            font-family: 'JetBrains Mono', monospace;
        }

        /* TASK CARD */
        .task-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 32px;
            margin-bottom: 24px;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-card:hover { border-color: var(--border); background: #111; }

        .task-info h4 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
        .task-info p { font-size: 14px; color: var(--muted); }

        .upload-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 14px 28px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-btn:hover { transform: scale(1.05); }

        .status-badge {
            font-size: 10px;
            font-weight: 900;
            padding: 6px 12px;
            border-radius: 6px;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent);
        }

        #auth-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .view-section { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>

    <div id="auth-overlay">
        <div style="font-size:60px; margin-bottom:30px;">👨‍💻</div>
        <h2 style="font-size:32px; font-weight:900; margin-bottom:15px;">WorkTrace Editor</h2>
        <p style="color:var(--muted); margin-bottom:40px; font-size:16px;">Access your assignments and earnings.</p>
        <button onclick="login()" style="background:#fff; color:#000; border:none; padding:16px 40px; border-radius:18px; font-weight:900; cursor:pointer; display:flex; align-items:center; gap:12px; font-size:16px;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22"> Login with Google
        </button>
    </div>

    <aside class="sidebar">
        <div class="logo">WORKTRACE EDITOR</div>
        <nav>
            <a href="#" class="nav-item active">Tasks Board</a>
            <a href="#" class="nav-item">My Uploads</a>
            <a href="#" class="nav-item">Earnings</a>
            <a href="#" class="nav-item">Profile</a>
        </nav>
    </aside>

    <main class="main">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:60px;">
            <h1 id="view-title" style="font-size: 28px; font-weight: 900;">My Assignments</h1>
            <button onclick="auth.signOut()" style="background:transparent; border:1px solid var(--border); color:var(--muted); padding:12px 24px; border-radius:16px; font-weight:700; cursor:pointer;">Logout</button>
        </header>

        <!-- TASKS VIEW -->
        <section id="view-tasks" class="view-section">
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">Pending Tasks</span>
                    <div class="stat-value" id="stat-tasks">0</div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">In Review</span>
                    <div class="stat-value" id="stat-review" style="color: var(--accent);">0</div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Total Fee</span>
                    <div class="stat-value" id="stat-earnings" style="color: #22c55e;">$0.00</div>
                </div>
            </div>

            <div id="task-list">
                <div style="padding:40px; text-align:center; color:var(--muted);">Syncing workspace...</div>
            </div>
        </section>

        <!-- EARNINGS VIEW -->
        <section id="view-earnings" class="view-section" style="display:none;">
            <div class="stat-card" style="margin-bottom:40px;">
                <span class="stat-label">Lifetime Revenue</span>
                <div class="stat-value" id="total-earned" style="font-size:48px; color:#22c55e;">$0.00</div>
            </div>
            <div style="background:var(--surface); border:1px solid var(--border); border-radius:32px; overflow:hidden;">
                <table style="width:100%; border-collapse:collapse;">
                    <thead style="background:rgba(255,255,255,0.02);">
                        <tr>
                            <th style="text-align:left; padding:24px; font-size:11px; color:var(--muted); text-transform:uppercase;">Project</th>
                            <th style="text-align:left; padding:24px; font-size:11px; color:var(--muted); text-transform:uppercase;">Status</th>
                            <th style="text-align:left; padding:24px; font-size:11px; color:var(--muted); text-transform:uppercase;">Fee</th>
                        </tr>
                    </thead>
                    <tbody id="earnings-list"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
